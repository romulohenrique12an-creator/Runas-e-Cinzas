<!DOCTYPE html>

<html>

<head>

<title>Entre Runas e Cinzas</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background-image:url("fundo.png");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
padding:30px;
}

h1,h2{
text-align:center;
}

.container{
max-width:900px;
margin:auto;
background:rgba(20,20,20,0.9);
padding:25px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.7);
}

.topo{
position:sticky;
top:0;
background:rgba(0,0,0,0.9);
padding:10px;
border-radius:8px;
margin-bottom:20px;
text-align:center;
font-size:18px;
}

button{
background:#444;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#666;
}

.pericia{
display:grid;
grid-template-columns:1fr 150px 120px;
align-items:center;
margin:6px 0;
border-bottom:1px solid rgba(255,255,255,0.1);
padding-bottom:4px;
}

.controle{
display:flex;
justify-content:center;
gap:8px;
}

.numero{
width:30px;
text-align:center;
font-weight:bold;
}

.status{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.statusbox{
background:#222;
padding:15px;
border-radius:8px;
text-align:center;
}

.maxbox{
width:60px;
background:#111;
color:white;
border:none;
border-radius:5px;
text-align:center;
margin-bottom:10px;
}

textarea{
width:100%;
height:100px;
background:#1f1f1f;
color:white;
border:none;
border-radius:6px;
margin-bottom:20px;
padding:10px;
}

.fichaCard{
background:#222;
padding:10px;
border-radius:10px;
width:160px;
text-align:center;
}

</style>

</head>

<body>

<div id="menu">

<h1>Entre Runas e Cinzas</h1>

<button onclick="novaFicha()">Criar Nova Ficha</button>

<div id="listaFichas" style="display:flex;flex-wrap:wrap;gap:20px;justify-content:center;margin-top:30px;"></div>

</div>

<div class="container" id="editor" style="display:none">

<h1>Ficha</h1>

<div class="topo">

Pontos de Perícia: <span id="pontos">70</span>

<button onclick="maisPontos()">+4</button> <button onclick="menosPontos()">-4</button>

</div>

<label>Nome</label> <input id="nome">

<label>Imagem do Personagem</label>
<br>

<img id="preview" src="" style="width:120px;height:120px;object-fit:cover;border-radius:8px;background:#222;">

<br><br>

<input type="file" accept="image/*" onchange="carregarImagem(event)">

<label>Classe</label> <select id="classe">

<option>Assassino</option>
<option>Tank</option>
<option>Mago</option>
<option>Investigador</option>
</select>

<label>Defesa</label> <input id="defesa" type="number">

<h2>Status</h2>

<div class="status">

<div class="statusbox">

Vida Máxima <br> <input id="vidaMax" class="maxbox" type="number" onchange="sincronizarVida()">

<br>

Vida Atual

<div class="controle">

<button onclick="menosStatus('vida')">-</button> <span id="vida">0</span> <button onclick="maisStatus('vida')">+</button>

</div>

</div>

<div class="statusbox">

Sanidade Máxima <br> <input id="sanMax" class="maxbox" type="number" onchange="sincronizarSan()">

<br>

Sanidade Atual

<div class="controle">

<button onclick="menosStatus('sanidade')">-</button> <span id="sanidade">0</span> <button onclick="maisStatus('sanidade')">+</button>

</div>

</div>

</div>

<h2>Perícias</h2>

<div id="lista"></div>

<h2>Habilidades</h2>
<textarea id="habilidades"></textarea>

<h2>Magias</h2>
<textarea id="magias"></textarea>

<h2>Itens</h2>
<textarea id="itens"></textarea>

<br>

<button onclick="salvarFicha()">Salvar Ficha</button> <button onclick="voltarMenu()">Voltar</button>

</div>

<script>

let fichas=JSON.parse(localStorage.getItem("fichasERC"))||[]
let fichaAtual=null

let pontos=70

let pericias=[
"Espadas","Lâminas Leves","Armas Pesadas","Arcos","Combate Desarmado", "Esquiva","Força","Pontaria", "Atletismo","Acrobacia","Escalada","Iniciativa","Furtividade","Reflexos", "Natação", "Investigação","Percepção","História","Religião","Linguística","Intuição", "Arcano","Conhecimento", "Persuasão","Diplomacia","Intimidação","Enganação","Empatia", "Liderança","Vontade", "Sobrevivência","Rastreamento","Caça","Agricultura","Navegação", "Adestramento","Crime", "Medicina","Alquimia","Engenharia","Ferraria","Tecnologia","Magia", "Pilotagem","Artesanato","Música","Culinária","Pintura","Sorte",
]

let lista=document.getElementById("lista")

pericias.forEach(nome=>{

let id=nome.replace(/\s/g,'')

let div=document.createElement("div")
div.className="pericia"

div.innerHTML=`

<span>${nome}</span>

<div class="controle">

<button onclick="menos('${id}')">-</button>

<span class="numero" id="${id}">0</span>

<button onclick="mais('${id}')">+</button>

</div>

<div>

<button onclick="rolar('${id}')">🎲</button>

<span id="resultado_${id}"></span>

</div>

`

lista.appendChild(div)

})

function mais(nome){

let el=document.getElementById(nome)

let v=parseInt(el.innerText)

if(v>=4)return
if(pontos<=0)return

el.innerText=v+1
pontos--

atualizarPontos()

}

function menos(nome){

let el=document.getElementById(nome)

let v=parseInt(el.innerText)

if(v<=0)return

el.innerText=v-1
pontos++

atualizarPontos()

}

function atualizarPontos(){

document.getElementById("pontos").innerText=pontos

}

function maisPontos(){

pontos+=4
atualizarPontos()

}

function menosPontos(){

if(pontos>=4){
pontos-=4
}

atualizarPontos()

}

function rolar(nome){

    let nivel = parseInt(document.getElementById(nome).innerText)

    let d12 = Math.floor(Math.random()*12)+1
    let bonus = 0
    let dadoBonus = 0

    if(nivel==1){dadoBonus=4}
    if(nivel==2){dadoBonus=6}
    if(nivel==3){dadoBonus=8}
    if(nivel==4){dadoBonus=10}

    if(dadoBonus>0){
        bonus = Math.floor(Math.random()*dadoBonus)+1
    }

    let total = d12 + bonus

    // Verifica fracasso
    let resultado = "Sucesso"
    if(total < 6){
        resultado = "Fracasso"
    }

    // Verifica extremo
    let extremoMin = [12,15,16,17,18]
    let extremoMax = [12,16,18,20,22]

    if(total >= extremoMin[nivel] && total <= extremoMax[nivel]){
        resultado = "Extremo"
    }

    // Texto mostrado
    let texto = "D12:"+d12
    if(dadoBonus>0){
        texto += " D"+dadoBonus+":"+bonus
    }
    texto += " → "+resultado

    document.getElementById("resultado_"+nome).innerText = texto
}

function maisStatus(nome){

let el=document.getElementById(nome)

el.innerText=parseInt(el.innerText)+1

}

function menosStatus(nome){

let el=document.getElementById(nome)

let v=parseInt(el.innerText)

if(v>0)el.innerText=v-1

}

function sincronizarVida(){

let max=document.getElementById("vidaMax").value

document.getElementById("vida").innerText=max

}

function sincronizarSan(){

let max=document.getElementById("sanMax").value

document.getElementById("sanidade").innerText=max

}

function novaFicha(){

fichaAtual=null

menu.style.display="none"
editor.style.display="block"

}

function voltarMenu(){

menu.style.display="block"
editor.style.display="none"

carregarMenu()

}

function salvarFicha(){

let ficha={
nome:nome.value,
classe:classe.value,
defesa:defesa.value,
vida:vida.innerText,
vidaMax:vidaMax.value,
sanidade:sanidade.innerText,
sanMax:sanMax.value
}

if(fichaAtual==null){

fichas.push(ficha)

}else{

fichas[fichaAtual]=ficha

}

localStorage.setItem("fichasERC",JSON.stringify(fichas))

voltarMenu()

}

function abrirFicha(i){

let f=fichas[i]

fichaAtual=i

menu.style.display="none"
editor.style.display="block"

nome.value=f.nome
classe.value=f.classe
defesa.value=f.defesa
vida.innerText=f.vida
vidaMax.value=f.vidaMax
sanidade.innerText=f.sanidade
sanMax.value=f.sanMax

}

function excluirFicha(i){

if(confirm("Excluir ficha de "+fichas[i].nome+"?")){

fichas.splice(i,1)

localStorage.setItem("fichasERC",JSON.stringify(fichas))

carregarMenu()

}

}

function carregarMenu(){

listaFichas.innerHTML=""

fichas.forEach((f,i)=>{

let card=document.createElement("div")
card.className="fichaCard"

card.innerHTML=`

<h3>${f.nome}</h3>

<button onclick="abrirFicha(${i})">Abrir</button>

<button onclick="excluirFicha(${i})">Excluir</button>

`

listaFichas.appendChild(card)

})

}

carregarMenu()

function carregarImagem(event){

let reader = new FileReader()

reader.onload = function(){
document.getElementById("preview").src = reader.result
}

reader.readAsDataURL(event.target.files[0])

}

</script>

</body>

</html>
